<!DOCTYPE html>
<html>
<head>
  <title>Carrot File Opener</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: orange;
      color: white;
      text-align: center;
    }

    #fileList {
      max-height: 200px;
      overflow: auto;
      border: 2px solid #ff8800;
      margin: 20px;
      padding: 10px;
      background: rgba(0,0,0,0.2);
    }

    .file {
      padding: 6px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.3);
    }

    .file:hover {
      background: rgba(0,0,0,0.2);
    }

    #viewer {
      margin-top: 20px;
    }

    img, iframe {
      max-width: 90%;
      max-height: 70vh;
    }

    /* 🔥 FULLSCREEN MODE */
    .fullscreen #fileList,
    .fullscreen h2,
    .fullscreen input {
      display: none;
    }

    .fullscreen #viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: orange;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fullscreen img,
    .fullscreen iframe {
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      object-fit: contain;
    }
  </style>
</head>
<body>

<h2>🥕 Carrot File Opener</h2>
<input type="file" id="fileInput">

<div id="fileList"></div>
<div id="viewer"><p>Select a file</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const input = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");
const viewer = document.getElementById("viewer");

input.addEventListener("change", async () => {
  const file = input.files[0];
  if (!file) return;

  fileList.innerHTML = "";
  viewer.innerHTML = "Loading...";

  const name = file.name.toLowerCase();

  if (name.endsWith(".zip")) {
    const zip = await JSZip.loadAsync(file);

    viewer.innerHTML = "<p>Click a file below</p>";

    Object.keys(zip.files).forEach(n => {
      if (zip.files[n].dir) return;

      const div = document.createElement("div");
      div.className = "file";
      div.textContent = n;

      div.onclick = async () => openFile(zip.files[n], n);

      fileList.appendChild(div);
    });
  } else {
    openDirectFile(file);
  }
});

async function openFile(fileObj, name) {
  const lower = name.toLowerCase();
  viewer.innerHTML = "Loading...";

  document.body.classList.add("fullscreen");

  if (lower.match(/\.(png|jpg|jpeg|gif|webp)$/)) {
    const blob = await fileObj.async("blob");
    showImage(blob);
  }
  else if (lower.endsWith(".html")) {
    const text = await fileObj.async("string");
    viewer.innerHTML = `<iframe srcdoc="${text.replace(/"/g,'&quot;')}"></iframe>`;
  }
  else {
    viewer.innerHTML = "<p>Can't preview</p>";
  }
}

function openDirectFile(file) {
  const name = file.name.toLowerCase();

  document.body.classList.add("fullscreen");

  if (name.match(/\.(png|jpg|jpeg|gif|webp)$/)) {
    showImage(file);
  }
  else if (name.endsWith(".html")) {
    const reader = new FileReader();
    reader.onload = e => {
      viewer.innerHTML = `<iframe srcdoc="${e.target.result.replace(/"/g,'&quot;')}"></iframe>`;
    };
    reader.readAsText(file);
  }
  else {
    viewer.innerHTML = "<p>Unsupported file</p>";
  }
}

function showImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    viewer.innerHTML = `<img src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);
}

// ⌨️ ESC to exit fullscreen
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    document.body.classList.remove("fullscreen");
    viewer.innerHTML = "<p>Select a file</p>";
  }
});
</script>

</body>
</html>
