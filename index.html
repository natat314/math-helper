<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Free Cookie</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #screen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      background: #00ff00;
      cursor: pointer;
    }

    h1 {
      font-size: 50px;
      color: black;
      background: white;
      padding: 20px 40px;
      border-radius: 15px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div id="screen">
  <h1>Click for cookie 🍪</h1>
</div>

<script>
  const screen = document.getElementById("screen");

  screen.addEventListener("click", () => {
    // Try fullscreen
    document.documentElement.requestFullscreen().catch(() => {});

    // Load muted autoplay video
    document.body.innerHTML = `
      <iframe 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=0&loop=1&playlist=dQw4w9WgXcQ" 
        allow="autoplay; fullscreen">
      </iframe>
    `;

    // Unmute on any further interaction
    document.addEventListener("click", () => {
      const iframe = document.querySelector("iframe");
      iframe.src = iframe.src.replace("mute=1", "mute=0");
    });
  });
</script>

</body>
</html>
